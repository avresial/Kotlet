<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root{color-scheme:light dark;--bg:#fffaf3;--surface:#fff;--surface-2:#f7efe5;--text:#2c211d;--muted:#74645c;--border:#e5d7ca;--accent:#7d3428;--ok:#28744b;--warn:#a66516;--danger:#a33a2b;--shadow:0 6px 22px #4d2a1714;font:14px/1.45 Inter,ui-sans-serif,system-ui,sans-serif}.app-dark{--bg:#1d1917;--surface:#28221f;--surface-2:#342b27;--text:#f5ebe1;--muted:#c0afa5;--border:#4a3c35;--accent:#e89b87;--ok:#82d5a6;--warn:#efbd6b;--danger:#f19786;--shadow:none}*{box-sizing:border-box}body{margin:0;padding:14px;background:var(--bg);color:var(--text)}header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.brand{display:flex;align-items:center;gap:9px}.mark{display:grid;place-items:center;width:32px;height:32px;border-radius:9px;background:var(--accent);color:var(--surface);font-weight:800}.eyebrow{margin:0;color:var(--accent);font-size:.72rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}h1{margin:1px 0 0;font-size:1.12rem}#summary{color:var(--muted);font-size:.82rem}.message{padding:11px 13px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px}.card{min-width:0;padding:13px;border:1px solid var(--border);border-radius:12px;background:var(--surface);box-shadow:var(--shadow)}.card h2{margin:0 0 9px;font-size:1rem;color:var(--text)}dl{display:grid;grid-template-columns:minmax(90px,.7fr) minmax(0,1.3fr);gap:7px 10px;margin:0}dt{color:var(--muted);font-size:.78rem}dd{min-width:0;margin:0;overflow-wrap:anywhere}.tag{display:inline-flex;padding:2px 7px;border-radius:999px;background:var(--surface-2);color:var(--accent);font-size:.76rem;font-weight:700}.tag.ok{color:var(--ok)}.tag.warn{color:var(--warn)}.tag.danger{color:var(--danger)}table{width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:12px;background:var(--surface);overflow:hidden;box-shadow:var(--shadow)}th,td{padding:9px 10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top;overflow-wrap:anywhere}th{background:var(--surface-2);color:var(--muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.03em}tr:last-child td{border-bottom:0}.nested{margin-top:8px;padding:9px;border-radius:8px;background:var(--surface-2)}a{color:var(--accent)}pre{margin:0;white-space:pre-wrap;overflow-wrap:anywhere;font:12px/1.5 ui-monospace,monospace}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:12px}.stat{padding:10px 12px;border-radius:10px;background:var(--surface-2)}.stat strong{display:block;font-size:1.1rem}.stat span,.meta{color:var(--muted);font-size:.78rem}.section{margin-top:14px}.section:first-child{margin-top:0}.section h2{margin:0 0 7px;color:var(--muted);font-size:.75rem;letter-spacing:.05em;text-transform:uppercase}.stack{display:grid;gap:7px}.row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface)}.row.done{opacity:.66}.row.done strong{text-decoration:line-through}.row-main{display:flex;min-width:0;gap:9px}.check{display:grid;flex:0 0 19px;place-items:center;width:19px;height:19px;margin-top:1px;border:1px solid var(--border);border-radius:5px;color:var(--ok);background:var(--surface-2);font-size:.75rem}.row-value{white-space:nowrap;text-align:right}.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}.match{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center}.confidence{width:92px;height:7px;border:0;border-radius:99px;background:var(--surface-2);accent-color:var(--ok)}.plan{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:9px}.day{min-width:0;padding:11px;border:1px solid var(--border);border-radius:11px;background:var(--surface)}.day h2{margin:0 0 8px;font-size:.95rem}.slot{margin-top:9px}.slot:first-of-type{margin-top:0}.slot-label{color:var(--accent);font-size:.7rem;font-weight:800;text-transform:uppercase}.meal{margin-top:3px;padding:6px 8px;border-radius:7px;background:var(--surface-2)}.meal strong{display:block;font-size:.84rem}.notice{padding:12px;border:1px solid var(--border);border-left:4px solid var(--ok);border-radius:10px;background:var(--surface)}.notice.warn{border-left-color:var(--warn)}@media(max-width:520px){body{padding:10px}.grid,.plan{grid-template-columns:1fr}table{display:block;overflow-x:auto}dl{grid-template-columns:1fr}dt{margin-top:5px}.match{grid-template-columns:1fr}.confidence{width:100%}}
</style>
</head>
<body>
<header><div class="brand"><span class="mark">K</span><div><p class="eyebrow">Kotlet</p><h1 id="title">Tool result</h1></div></div><span id="summary"></span></header>
<main id="content"><p class="message">Loading Kotlet data…</p></main>
<script>
"use strict";
const bridge=(()=>{const pending=new Map();let nextId=1;const post=m=>parent.postMessage(m,"*");const request=(method,params)=>new Promise((resolve,reject)=>{const id=nextId++;pending.set(id,{resolve,reject});post({jsonrpc:"2.0",id,method,params})});const handlers=new Map();addEventListener("message",event=>{const m=event.data;if(!m||m.jsonrpc!=="2.0")return;if(m.id!==undefined&&m.method===undefined){const p=pending.get(m.id);if(!p)return;pending.delete(m.id);m.error?p.reject(new Error(m.error.message||"Host request failed.")):p.resolve(m.result)}else if(m.method!==undefined&&m.id!==undefined)post({jsonrpc:"2.0",id:m.id,result:{}});else if(m.method!==undefined&&handlers.has(m.method))handlers.get(m.method)(m.params)});return{request,notify:(method,params)=>post({jsonrpc:"2.0",method,params:params||{}}),on:(method,fn)=>handlers.set(method,fn)}})();
const root=document.getElementById("content"),summary=document.getElementById("summary"),pageTitle=document.getElementById("title");
const esc=value=>String(value).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");
const label=key=>String(key).replace(/([a-z0-9])([A-Z])/g,"$1 $2").replaceAll("_"," ").replace(/^./,c=>c.toUpperCase());
const scalar=value=>{if(value===null||value===undefined)return '<span class="tag">None</span>';if(typeof value==="boolean")return `<span class="tag ${value?"ok":""}">${value?"Yes":"No"}</span>`;if(typeof value==="string"&&/^(kotlet|https?):\/\//.test(value))return `<a href="${esc(value)}" target="_blank">${esc(value)}</a>`;return esc(value)};
const amount=(value,unit)=>`${Number(value).toLocaleString(undefined,{maximumFractionDigits:2})}${unit?" "+esc(unit):""}`;
const money=value=>Number(value).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const setHeading=(title,detail)=>{pageTitle.textContent=title;summary.textContent=detail||""};
function fields(object){return Object.entries(object).map(([key,value])=>`<dt>${esc(label(key))}</dt><dd>${complex(value)}</dd>`).join("")}
function complex(value){if(Array.isArray(value))return value.length?`<div class="nested">${value.map((v,i)=>typeof v==="object"&&v!==null?`<div class="${i?"nested":""}">${Array.isArray(v)?complex(v):`<dl>${fields(v)}</dl>`}</div>`:`<span class="tag">${scalar(v)}</span>`).join(" ")}</div>`:'<span class="tag">Empty</span>';if(typeof value==="object"&&value!==null)return `<div class="nested"><dl>${fields(value)}</dl></div>`;return scalar(value)}
function table(items){const keys=[...new Set(items.flatMap(item=>Object.keys(item)))];if(keys.length>7)return cards(items);return `<table><thead><tr>${keys.map(k=>`<th>${esc(label(k))}</th>`).join("")}</tr></thead><tbody>${items.map(item=>`<tr>${keys.map(k=>`<td>${complex(item[k])}</td>`).join("")}</tr>`).join("")}</tbody></table>`}
function titleFor(item,index){const pair=Object.entries(item).find(([key,value])=>typeof value==="string"&&/(name|title|date|status)$/i.test(key));return pair?pair[1]:`Item ${index+1}`}
function cards(items){return `<div class="grid">${items.map((item,index)=>`<article class="card"><h2>${esc(titleFor(item,index))}</h2><dl>${fields(item)}</dl></article>`).join("")}</div>`}
function shopping(items){const purchased=items.filter(item=>item.isPurchased).length,total=items.reduce((sum,item)=>sum+Number(item.totalPrice||0),0),groups=Map.groupBy(items,item=>item.category||"Other");setHeading("Shopping list",`${purchased} of ${items.length} bought`);root.innerHTML=`<div class="stats"><div class="stat"><strong>${items.length-purchased}</strong><span>still needed</span></div><div class="stat"><strong>${money(total)}</strong><span>estimated total</span></div></div>`+[...groups].map(([category,entries])=>`<section class="section"><h2>${esc(category)}</h2><div class="stack">${entries.map(item=>`<div class="row ${item.isPurchased?"done":""}"><div class="row-main"><span class="check">${item.isPurchased?"✓":""}</span><div><strong>${esc(item.ingredientName)}</strong><div class="meta">${esc(item.measurementUnit)}</div></div></div><div class="row-value"><strong>${amount(item.quantity,item.measurementUnit)}</strong><div class="meta">${money(item.totalPrice||0)}</div></div></div>`).join("")}</div></section>`).join("")}
function expiry(date){if(!date)return["","No expiry"];const days=Math.ceil((new Date(date+"T00:00:00")-new Date().setHours(0,0,0,0))/86400000);return days<0?["danger","Expired"]:days<=7?["warn",`${days} day${days===1?"":"s"} left`]:["ok",date]}
function pantry(items){const groups=Map.groupBy(items,item=>item.storageLocation||"Unspecified");setHeading("Pantry",`${items.length} item${items.length===1?"":"s"}`);root.innerHTML=[...groups].map(([location,entries])=>`<section class="section"><h2>${esc(location)}</h2><div class="stack">${entries.map(item=>{const status=expiry(item.expirationDate);return `<div class="row"><div><strong>${esc(item.ingredientName)}</strong><div class="meta">${esc(item.measurementUnit)}</div></div><div class="row-value"><strong>${amount(item.quantity,item.measurementUnit)}</strong><div class="tag ${status[0]}">${esc(status[1])}</div></div></div>`}).join("")}</div></section>`).join("")}
function prepared(items){const list=Array.isArray(items)?items:[items],active=list.filter(item=>!item.isArchived).length;setHeading(Array.isArray(items)?"Prepared meals":"Prepared meal",Array.isArray(items)?`${active} active`:"Details");root.innerHTML=`<div class="grid">${list.map(item=>`<article class="card"><h2>${esc(item.name)} ${item.isArchived?'<span class="tag warn">Archived</span>':""}</h2><div class="meta">${[item.brand,item.store,item.category].filter(Boolean).map(esc).join(" · ")}</div><div class="stats" style="margin-top:10px"><div class="stat"><strong>${esc(item.servings)}</strong><span>servings</span></div><div class="stat"><strong>${amount(item.caloriesPerServing,"kcal")}</strong><span>per serving</span></div>${item.price===null||item.price===undefined?"":`<div class="stat"><strong>${money(item.price)}</strong><span>price</span></div>`}</div>${item.description?`<p>${esc(item.description)}</p>`:""}${item.packageQuantity?`<p class="meta">Package: ${amount(item.packageQuantity,item.packageUnit)}</p>`:""}${item.preparationInstructions?`<div class="nested"><strong>Preparation</strong><div>${esc(item.preparationInstructions)}</div></div>`:""}${item.addons&&item.addons.length?`<div class="chips">${item.addons.map(addon=>`<span class="tag ${addon.isRequired?"warn":""}">${esc(addon.ingredientName)} · ${amount(addon.quantity,addon.unit)}</span>`).join("")}</div>`:""}</article>`).join("")}</div>`}
function mealPlan(days){setHeading("Meal plan",`${days.length} day${days.length===1?"":"s"}`);root.innerHTML=`<div class="plan">${days.map(day=>{const slots=Object.entries(day.meals||{}).filter(([,meals])=>meals.length);return `<article class="day"><h2>${esc(day.date)}</h2>${slots.length?slots.map(([slot,meals])=>`<div class="slot"><div class="slot-label">${esc(label(slot))}</div>${meals.map(meal=>`<div class="meal"><strong>${esc(meal.displayName||meal.type)}</strong><span class="meta">${amount(meal.servings,"servings")}${meal.guests?` · ${esc(meal.guests)} guests`:""}</span></div>`).join("")}</div>`).join(""):'<span class="meta">Nothing planned</span>'}</article>`}).join("")}</div>`}
function ingredientMatches(items){setHeading("Ingredient matches",`${items.filter(item=>item.exactMatch).length} exact`);root.innerHTML=`<div class="stack">${items.map(item=>{const score=Math.round(Number(item.similarity||0)*100),status=!item.matchedName?["danger","No match"]:item.exactMatch?["ok","Exact"]:score>=75?["warn","Review"]:["danger","Weak"];return `<article class="card match"><div><div class="meta">${esc(item.inputName)}</div><h2>${esc(item.matchedName||"No catalog match")}</h2><div class="chips"><span class="tag ${status[0]}">${status[1]}</span>${item.matchedLanguage?`<span class="tag">${esc(item.matchedLanguage)}</span>`:""}${item.measurementUnit?`<span class="tag">${esc(item.measurementUnit)}</span>`:""}</div></div><div><strong>${score}%</strong><br><meter class="confidence" min="0" max="100" value="${score}">${score}%</meter></div></article>`}).join("")}</div>`}
function duplicates(data){setHeading("Duplicate check",data.exists?"Matches found":"No duplicate");root.innerHTML=`<div class="notice ${data.exists?"warn":""}"><strong>${data.exists?"Review before adding":"This recipe looks new"}</strong><div class="meta">${data.exists?`${data.matches.length} possible match${data.matches.length===1?"":"es"}`:"No matching source or title was found."}</div></div>${data.matches.length?`<div class="grid" style="margin-top:10px">${data.matches.map(match=>`<article class="card"><h2>${esc(match.title)}</h2><span class="tag warn">${esc(label(match.matchType))}</span>${match.sourceUrl?`<p>${scalar(match.sourceUrl)}</p>`:""}<p class="meta">${esc(match.recipeId)}</p></article>`).join("")}</div>`:""}`}
function render(data,content){root.innerHTML="";if(data!==undefined&&data!==null){if(Array.isArray(data)&&data.length&&data.every(item=>item&&"inputName" in item&&"exactMatch" in item))ingredientMatches(data);else if(Array.isArray(data)&&data.length&&data.every(item=>item&&"isPurchased" in item&&"totalPrice" in item))shopping(data);else if(Array.isArray(data)&&data.length&&data.every(item=>item&&"expirationDate" in item&&"storageLocation" in item))pantry(data);else if(Array.isArray(data)&&data.length&&data.every(item=>item&&"date" in item&&"meals" in item))mealPlan(data);else if((Array.isArray(data)&&data.length&&data.every(item=>item&&"caloriesPerServing" in item&&"addons" in item))||(!Array.isArray(data)&&typeof data==="object"&&"caloriesPerServing" in data&&"addons" in data))prepared(data);else if(!Array.isArray(data)&&typeof data==="object"&&"exists" in data&&Array.isArray(data.matches))duplicates(data);else if(Array.isArray(data)){setHeading("Tool result",`${data.length} item${data.length===1?"":"s"}`);root.innerHTML=data.length?(data.every(v=>v&&typeof v==="object"&&!Array.isArray(v))?table(data):complex(data)):'<p class="message">No items found.</p>'}else if(typeof data==="object"){setHeading("Tool result","Details");root.innerHTML='<article class="card"><dl>'+fields(data)+'</dl></article>'}else{setHeading("Tool result","");root.innerHTML=`<p class="message">${scalar(data)}</p>`}return}const blocks=content||[];const links=blocks.filter(b=>b.type==="resource_link");if(links.length){setHeading("Tool result",`${links.length} item${links.length===1?"":"s"}`);root.innerHTML=cards(links);return}const text=blocks.filter(b=>b.type==="text").map(b=>b.text).join("\n");setHeading("Tool result","");root.innerHTML=text?`<article class="card"><pre>${esc(text)}</pre></article>`:'<p class="message">The tool returned no displayable data.</p>'}
function context(value){const theme=value&&value.theme;document.documentElement.classList.toggle("app-dark",theme?theme==="dark":matchMedia("(prefers-color-scheme: dark)").matches)}
bridge.on("ui/notifications/tool-result",params=>render(params&&params.structuredContent,params&&params.content));bridge.on("ui/notifications/host-context-changed",params=>context((params&&params.hostContext)||params));
(async()=>{context(null);try{const result=await bridge.request("ui/initialize",{protocolVersion:"2026-01-26",appInfo:{name:"kotlet-data",version:"1.0.0"},appCapabilities:{availableDisplayModes:["inline"]}});context(result&&result.hostContext);bridge.notify("ui/notifications/initialized")}catch(error){root.innerHTML=`<p class="message">${esc("MCP Apps initialization failed: "+error.message)}</p>`}})();
</script>
</body>
</html>
