<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root{color-scheme:light dark;--bg:#fffaf3;--surface:#fff;--surface-2:#f7efe5;--text:#2c211d;--muted:#74645c;--border:#e5d7ca;--accent:#7d3428;--ok:#28744b;--shadow:0 6px 22px #4d2a1714;font:14px/1.45 Inter,ui-sans-serif,system-ui,sans-serif}.app-dark{--bg:#1d1917;--surface:#28221f;--surface-2:#342b27;--text:#f5ebe1;--muted:#c0afa5;--border:#4a3c35;--accent:#e89b87;--ok:#82d5a6;--shadow:none}*{box-sizing:border-box}body{margin:0;padding:14px;background:var(--bg);color:var(--text)}header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.brand{display:flex;align-items:center;gap:9px}.mark{display:grid;place-items:center;width:32px;height:32px;border-radius:9px;background:var(--accent);color:var(--surface);font-weight:800}.eyebrow{margin:0;color:var(--accent);font-size:.72rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}h1{margin:1px 0 0;font-size:1.12rem}#summary{color:var(--muted);font-size:.82rem}.message{padding:11px 13px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px}.card{min-width:0;padding:13px;border:1px solid var(--border);border-radius:12px;background:var(--surface);box-shadow:var(--shadow)}.card h2{margin:0 0 9px;font-size:1rem;color:var(--text)}dl{display:grid;grid-template-columns:minmax(90px,.7fr) minmax(0,1.3fr);gap:7px 10px;margin:0}dt{color:var(--muted);font-size:.78rem}dd{min-width:0;margin:0;overflow-wrap:anywhere}.tag{display:inline-flex;padding:2px 7px;border-radius:999px;background:var(--surface-2);color:var(--accent);font-size:.76rem;font-weight:700}.tag.ok{color:var(--ok)}table{width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:12px;background:var(--surface);overflow:hidden;box-shadow:var(--shadow)}th,td{padding:9px 10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top;overflow-wrap:anywhere}th{background:var(--surface-2);color:var(--muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.03em}tr:last-child td{border-bottom:0}.nested{margin-top:8px;padding:9px;border-radius:8px;background:var(--surface-2)}a{color:var(--accent)}pre{margin:0;white-space:pre-wrap;overflow-wrap:anywhere;font:12px/1.5 ui-monospace,monospace}@media(max-width:520px){body{padding:10px}.grid{grid-template-columns:1fr}table{display:block;overflow-x:auto}dl{grid-template-columns:1fr}dt{margin-top:5px}}
</style>
</head>
<body>
<header><div class="brand"><span class="mark">K</span><div><p class="eyebrow">Kotlet</p><h1>Tool result</h1></div></div><span id="summary"></span></header>
<main id="content"><p class="message">Loading Kotlet data…</p></main>
<script>
"use strict";
const bridge=(()=>{const pending=new Map();let nextId=1;const post=m=>parent.postMessage(m,"*");const request=(method,params)=>new Promise((resolve,reject)=>{const id=nextId++;pending.set(id,{resolve,reject});post({jsonrpc:"2.0",id,method,params})});const handlers=new Map();addEventListener("message",event=>{const m=event.data;if(!m||m.jsonrpc!=="2.0")return;if(m.id!==undefined&&m.method===undefined){const p=pending.get(m.id);if(!p)return;pending.delete(m.id);m.error?p.reject(new Error(m.error.message||"Host request failed.")):p.resolve(m.result)}else if(m.method!==undefined&&m.id!==undefined)post({jsonrpc:"2.0",id:m.id,result:{}});else if(m.method!==undefined&&handlers.has(m.method))handlers.get(m.method)(m.params)});return{request,notify:(method,params)=>post({jsonrpc:"2.0",method,params:params||{}}),on:(method,fn)=>handlers.set(method,fn)}})();
const root=document.getElementById("content"),summary=document.getElementById("summary");
const esc=value=>String(value).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");
const label=key=>String(key).replace(/([a-z0-9])([A-Z])/g,"$1 $2").replaceAll("_"," ").replace(/^./,c=>c.toUpperCase());
const scalar=value=>{if(value===null||value===undefined)return '<span class="tag">None</span>';if(typeof value==="boolean")return `<span class="tag ${value?"ok":""}">${value?"Yes":"No"}</span>`;if(typeof value==="string"&&/^(kotlet|https?):\/\//.test(value))return `<a href="${esc(value)}" target="_blank">${esc(value)}</a>`;return esc(value)};
function fields(object){return Object.entries(object).map(([key,value])=>`<dt>${esc(label(key))}</dt><dd>${complex(value)}</dd>`).join("")}
function complex(value){if(Array.isArray(value))return value.length?`<div class="nested">${value.map((v,i)=>typeof v==="object"&&v!==null?`<div class="${i?"nested":""}">${Array.isArray(v)?complex(v):`<dl>${fields(v)}</dl>`}</div>`:`<span class="tag">${scalar(v)}</span>`).join(" ")}</div>`:'<span class="tag">Empty</span>';if(typeof value==="object"&&value!==null)return `<div class="nested"><dl>${fields(value)}</dl></div>`;return scalar(value)}
function table(items){const keys=[...new Set(items.flatMap(item=>Object.keys(item)))];if(keys.length>7)return cards(items);return `<table><thead><tr>${keys.map(k=>`<th>${esc(label(k))}</th>`).join("")}</tr></thead><tbody>${items.map(item=>`<tr>${keys.map(k=>`<td>${complex(item[k])}</td>`).join("")}</tr>`).join("")}</tbody></table>`}
function titleFor(item,index){const pair=Object.entries(item).find(([key,value])=>typeof value==="string"&&/(name|title|date|status)$/i.test(key));return pair?pair[1]:`Item ${index+1}`}
function cards(items){return `<div class="grid">${items.map((item,index)=>`<article class="card"><h2>${esc(titleFor(item,index))}</h2><dl>${fields(item)}</dl></article>`).join("")}</div>`}
function render(data,content){root.innerHTML="";if(data!==undefined&&data!==null){if(Array.isArray(data)){summary.textContent=`${data.length} item${data.length===1?"":"s"}`;root.innerHTML=data.length?(data.every(v=>v&&typeof v==="object"&&!Array.isArray(v))?table(data):complex(data)):'<p class="message">No items found.</p>'}else if(typeof data==="object"){summary.textContent="Details";root.innerHTML='<article class="card"><dl>'+fields(data)+'</dl></article>'}else root.innerHTML=`<p class="message">${scalar(data)}</p>`;return}const blocks=content||[];const links=blocks.filter(b=>b.type==="resource_link");if(links.length){summary.textContent=`${links.length} item${links.length===1?"":"s"}`;root.innerHTML=cards(links);return}const text=blocks.filter(b=>b.type==="text").map(b=>b.text).join("\n");root.innerHTML=text?`<article class="card"><pre>${esc(text)}</pre></article>`:'<p class="message">The tool returned no displayable data.</p>'}
function context(value){const theme=value&&value.theme;document.documentElement.classList.toggle("app-dark",theme?theme==="dark":matchMedia("(prefers-color-scheme: dark)").matches)}
bridge.on("ui/notifications/tool-result",params=>render(params&&params.structuredContent,params&&params.content));bridge.on("ui/notifications/host-context-changed",params=>context((params&&params.hostContext)||params));
(async()=>{context(null);try{const result=await bridge.request("ui/initialize",{protocolVersion:"2026-01-26",appInfo:{name:"kotlet-data",version:"1.0.0"},appCapabilities:{availableDisplayModes:["inline"]}});context(result&&result.hostContext);bridge.notify("ui/notifications/initialized")}catch(error){root.innerHTML=`<p class="message">${esc("MCP Apps initialization failed: "+error.message)}</p>`}})();
</script>
</body>
</html>
