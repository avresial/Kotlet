<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kotlet recipes</title>
<style>
  /* Palette and card styling mirror src/frontend (styles.scss, recipe-list-page.scss,
     recipe-detail-page.scss) so the embedded UI looks like the Kotlet app. */
  :root {
    --app-bg: #f6f1e8; --app-surface: #fffaf2; --app-surface-raised: #fffdf9; --app-surface-bright: #fff;
    --app-text: #29251f; --app-text-soft: #554e45; --app-text-muted: #746d63;
    --app-border: #dcd2c4; --app-border-strong: #cfc3b4;
    --app-inset: #f4ead9; --app-inset-strong: #f2dfd7;
    --app-accent: #8e392b; --app-accent-bg: #f8e8e2;
    --app-danger: #9a3022; --app-danger-bg: #fff0ec; --app-danger-border: #d99b8b;
    --app-ai: #5b3ca0; --app-ai-bg: #eee7ff;
    --app-link: #7d3428;
    color: var(--app-text); background: var(--app-bg); font-family: system-ui, sans-serif;
  }
  .app-dark {
    --app-bg: #171512; --app-surface: #211e1a; --app-surface-raised: #29251f; --app-surface-bright: #302b25;
    --app-text: #f4eee5; --app-text-soft: #ded5c9; --app-text-muted: #b8aea1;
    --app-border: #49423a; --app-border-strong: #5a5147;
    --app-inset: #2c2823; --app-inset-strong: #38312a;
    --app-accent: #d98a6f; --app-accent-bg: #3a2620;
    --app-danger: #e2917f; --app-danger-bg: #33211d; --app-danger-border: #6d3d33;
    --app-ai: #c6b3f0; --app-ai-bg: #2c2440;
    --app-link: #d98a6f;
  }
  html, body { margin: 0; min-width: 16rem; }
  body { color: var(--app-text); background: var(--app-bg); padding: 1rem; }
  button { font: inherit; }

  .eyebrow { margin: 0; color: var(--app-accent); font-size: .7rem; font-weight: 800; letter-spacing: .13em; text-transform: uppercase; }
  .empty { margin: 2rem 0; color: var(--app-text-muted); text-align: center; }
  .error {
    padding: 12px 16px; margin-bottom: 16px; border-radius: .6rem;
    background: var(--app-danger-bg); color: var(--app-danger); border: 1px solid var(--app-danger-border);
  }
  .ai-badge {
    display: inline-block; padding: .1rem .45rem; border-radius: 999px; vertical-align: middle;
    background: var(--app-ai-bg); color: var(--app-ai); font-size: .65rem; font-weight: 700; letter-spacing: .05em;
  }

  /* List view (mirrors .recipe-grid / .recipe-card) */
  .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(13rem, 1fr)); gap: 1rem; }
  .recipe-card {
    position: relative; display: flex; flex-direction: column; overflow: hidden;
    border: 1px solid var(--app-border); border-radius: 1rem; background: var(--app-surface);
    box-shadow: 0 .7rem 2rem rgb(70 52 31 / 5%);
  }
  .recipe-image { display: block; width: 100%; height: 8.5rem; object-fit: cover; background: var(--app-inset); }
  .card-body { flex: 1; padding: 14px 16px; }
  .card-body h2 { margin: 0 0 6px; font: 500 1.15rem Georgia, serif; }
  .card-body .meta { margin: 0 0 4px; font-size: .85rem; color: var(--app-text-muted); }
  .card-actions { padding: 0 16px 14px; }
  .button {
    display: inline-flex; align-items: center; padding: 8px 16px; border-radius: 6px;
    border: 1px solid transparent; font-size: .9rem; font-weight: 500; cursor: pointer; text-decoration: none;
  }
  .button.primary { background: #963827; color: #fff; }
  .button.primary:hover { background: #842f20; }
  .button.secondary { background: transparent; border-color: var(--app-border-strong); color: var(--app-text-soft); }
  .button:disabled { opacity: .5; cursor: not-allowed; }
  .list-footer { margin-top: 1rem; font-size: .85rem; color: var(--app-text-muted); text-align: center; }

  /* Detail view (mirrors recipe-detail-page) */
  .back {
    display: inline-block; margin-bottom: .8rem; padding: 0; border: 0; background: none;
    color: var(--app-link); font-size: .9rem; font-weight: 700; cursor: pointer;
  }
  .detail-card {
    border: 1px solid var(--app-border); border-radius: 1rem; overflow: hidden;
    background: var(--app-surface); box-shadow: 0 .7rem 2rem rgb(70 52 31 / 5%);
  }
  .detail-image { display: block; width: 100%; max-height: 16rem; object-fit: cover; background: var(--app-inset); }
  .detail-body { padding: 1.1rem 1.25rem 1.4rem; }
  .detail-body h1 { margin: .35rem 0 .6rem; font: 500 1.7rem/1.15 Georgia, serif; }
  .detail-meta { margin: 0 0 1rem; font-size: .85rem; color: var(--app-text-muted); }
  .detail-body h2 { margin: 1.2rem 0 .5rem; font: 500 1.15rem Georgia, serif; }
  .ingredient-list { margin: 0; padding: 0; list-style: none; }
  .ingredient-item {
    display: flex; align-items: baseline; justify-content: space-between; gap: .75rem;
    padding: .5rem .1rem; border-bottom: 1px solid var(--app-border);
  }
  .ingredient-item:last-child { border-bottom: 0; }
  .ing-name { font-weight: 500; }
  .ing-note { display: block; font-size: .8rem; color: var(--app-text-muted); }
  .ing-qty { white-space: nowrap; color: var(--app-text-soft); }
  .markdown-body { line-height: 1.55; color: var(--app-text-soft); }
  .markdown-body p { margin: .5rem 0; }
  .markdown-body ol, .markdown-body ul { margin: .5rem 0; padding-left: 1.4rem; }
  .markdown-body li { margin: .3rem 0; }
  .markdown-body h3, .markdown-body h4 { margin: .9rem 0 .35rem; color: var(--app-text); }
</style>
</head>
<body>
<div id="error" class="error" hidden></div>

<section id="list-view" hidden>
  <p class="eyebrow">Kotlet · Recipes</p>
  <div id="recipe-grid" class="recipe-grid" role="list"></div>
  <p id="list-footer" class="list-footer" hidden></p>
</section>

<section id="detail-view" hidden>
  <button type="button" id="back" class="back">← Recipes</button>
  <article id="detail-card" class="detail-card"></article>
</section>

<p id="loading" class="empty">Loading recipes…</p>

<script>
"use strict";
/* Minimal MCP Apps (SEP-1865) bridge.
 * Hand-rolled equivalent of @modelcontextprotocol/ext-apps: JSON-RPC 2.0 over
 * window.parent.postMessage. Kept dependency-free so the UI stays a single HTML
 * document that satisfies the default MCP Apps CSP (no external scripts). */
const bridge = (() => {
  const pending = new Map();
  let nextId = 1;
  const post = (message) => window.parent.postMessage(message, "*");
  const request = (method, params) => new Promise((resolve, reject) => {
    const id = nextId++;
    pending.set(id, { resolve, reject });
    post({ jsonrpc: "2.0", id, method, params });
  });
  const notify = (method, params) => post({ jsonrpc: "2.0", method, params: params ?? {} });
  const notificationHandlers = new Map();

  window.addEventListener("message", (event) => {
    const message = event.data;
    if (!message || message.jsonrpc !== "2.0") return;
    if (message.id !== undefined && message.method === undefined) {
      const entry = pending.get(message.id);
      if (!entry) return;
      pending.delete(message.id);
      if (message.error) entry.reject(new Error(message.error.message || "Host request failed."));
      else entry.resolve(message.result);
    } else if (message.method !== undefined && message.id !== undefined) {
      // Host-initiated request (e.g. ui/resource-teardown): acknowledge with an empty result.
      post({ jsonrpc: "2.0", id: message.id, result: {} });
    } else if (message.method !== undefined) {
      const handler = notificationHandlers.get(message.method);
      if (handler) handler(message.params);
    }
  });

  return {
    request,
    notify,
    on: (method, handler) => notificationHandlers.set(method, handler),
    callTool: (name, args) => request("tools/call", { name, arguments: args })
  };
})();

const el = (id) => document.getElementById(id);
const state = { apiOrigin: "", listData: null };

function applyHostContext(context) {
  const theme = context && context.theme;
  const dark = theme ? theme === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
  document.documentElement.classList.toggle("app-dark", dark);
}

function showError(message) {
  const box = el("error");
  box.textContent = message;
  box.hidden = false;
}

function show(view) {
  el("loading").hidden = true;
  el("list-view").hidden = view !== "list";
  el("detail-view").hidden = view !== "detail";
}

const escapeHtml = (text) => String(text)
  .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
  .replaceAll('"', "&quot;").replaceAll("'", "&#39;");

/* Tiny markdown subset (headings, ordered/unordered lists, bold, italics) for
 * descriptionMarkdown. Input is HTML-escaped first, so output stays inert. */
function renderMarkdown(markdown) {
  const inline = (text) => text
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/\*([^*]+)\*/g, "<em>$1</em>");
  const blocks = [];
  let list = null; // { tag: "ol" | "ul", items: [] }
  const flushList = () => {
    if (list) blocks.push(`<${list.tag}>` + list.items.map((i) => `<li>${i}</li>`).join("") + `</${list.tag}>`);
    list = null;
  };
  for (const rawLine of escapeHtml(markdown).split(/\r?\n/)) {
    const line = rawLine.trim();
    const ordered = line.match(/^\d+[.)]\s+(.*)/);
    const unordered = line.match(/^[-*]\s+(.*)/);
    const heading = line.match(/^(#{1,6})\s+(.*)/);
    if (ordered || unordered) {
      const tag = ordered ? "ol" : "ul";
      if (!list || list.tag !== tag) { flushList(); list = { tag, items: [] }; }
      list.items.push(inline((ordered || unordered)[1]));
    } else if (heading) {
      flushList();
      blocks.push(`<h${Math.min(heading[1].length + 2, 6)}>${inline(heading[2])}</h${Math.min(heading[1].length + 2, 6)}>`);
    } else if (line === "") {
      flushList();
    } else {
      flushList();
      blocks.push(`<p>${inline(line)}</p>`);
    }
  }
  flushList();
  return blocks.join("");
}

const plural = (count, word) => `${count} ${word}${count === 1 ? "" : "s"}`;
const mealTypeLabel = (mealType) =>
  mealType ? mealType.charAt(0).toUpperCase() + mealType.slice(1) : null;
const absoluteUrl = (url) =>
  url && url.startsWith("/") ? state.apiOrigin + url : url;

function renderList(data) {
  state.listData = data;
  state.apiOrigin = data.apiOrigin || "";
  const grid = el("recipe-grid");
  grid.innerHTML = "";
  if (!data.recipes || data.recipes.length === 0) {
    grid.innerHTML = '<p class="empty">No recipes yet.</p>';
    show("list");
    return;
  }
  for (const recipe of data.recipes) {
    const card = document.createElement("article");
    card.className = "recipe-card";
    card.setAttribute("role", "listitem");
    card.innerHTML =
      (recipe.imageUrl ? `<img class="recipe-image" src="${escapeHtml(recipe.imageUrl)}" alt="${escapeHtml(recipe.title)}" onerror="this.remove()" />` : "") +
      '<div class="card-body">' +
      `<h2>${escapeHtml(recipe.title)}${recipe.isAiAssisted ? ' <span class="ai-badge" title="AI-assisted">AI</span>' : ""}</h2>` +
      (recipe.mealType ? `<p class="meta">${escapeHtml(mealTypeLabel(recipe.mealType))}</p>` : "") +
      `<p class="meta">${plural(recipe.servings, "serving")} · ${plural(recipe.ingredientCount, "ingredient")}</p>` +
      "</div>" +
      '<div class="card-actions"><button type="button" class="button primary">View recipe</button></div>';
    const viewButton = card.querySelector("button");
    viewButton.addEventListener("click", () => openRecipe(recipe.id, viewButton));
    grid.appendChild(card);
  }
  const footer = el("list-footer");
  footer.hidden = data.totalCount <= data.recipes.length;
  footer.textContent = `Showing ${data.recipes.length} of ${plural(data.totalCount, "recipe")}.`;
  show("list");
}

function renderDetail(recipe) {
  const image = (recipe.images || [])[0];
  const ingredients = (recipe.ingredients || []).map((ing) => {
    const wholeQuantity = Number.isInteger(ing.quantity);
    const quantity = wholeQuantity ? ing.quantity : ing.normalizedQuantity;
    const unit = wholeQuantity ? ing.unit : ing.normalizedUnit;
    return '<li class="ingredient-item"><span class="ingredient-copy">' +
      `<span class="ing-name">${escapeHtml(ing.name)}</span>` +
      (ing.note ? `<span class="ing-note">${escapeHtml(ing.note)}</span>` : "") +
      `</span><span class="ing-qty">${escapeHtml(String(quantity))} ${escapeHtml(unit)}</span></li>`;
  }).join("");
  el("detail-card").innerHTML =
    (image ? `<img class="detail-image" src="${escapeHtml(absoluteUrl(image.contentUrl))}" alt="${escapeHtml(image.altText || recipe.title)}" onerror="this.remove()" />` : "") +
    '<div class="detail-body">' +
    `<p class="eyebrow">Recipe · ${plural(recipe.servings, "serving")}${recipe.mealType ? " · " + escapeHtml(mealTypeLabel(recipe.mealType)) : ""}</p>` +
    `<h1>${escapeHtml(recipe.title)}${recipe.isAiAssisted ? ' <span class="ai-badge" title="AI-assisted">AI</span>' : ""}</h1>` +
    `<p class="detail-meta">♧ ${plural((recipe.ingredients || []).length, "ingredient")}</p>` +
    (ingredients ? `<h2>Ingredients</h2><ul class="ingredient-list">${ingredients}</ul>` : "") +
    (recipe.descriptionMarkdown ? `<h2>Method</h2><div class="markdown-body">${renderMarkdown(recipe.descriptionMarkdown)}</div>` : "") +
    "</div>";
  show("detail");
}

async function openRecipe(recipeId, button) {
  el("error").hidden = true;
  if (button) { button.disabled = true; button.textContent = "Loading…"; }
  try {
    const result = await bridge.callTool("get_recipe", { recipeId });
    if (result.isError) {
      const text = (result.content || []).map((block) => block.text).join(" ");
      throw new Error(text || "The recipe could not be loaded.");
    }
    if (!result.structuredContent) throw new Error("The host returned no recipe data.");
    renderDetail(result.structuredContent);
  } catch (error) {
    showError(error.message);
  } finally {
    if (button) { button.disabled = false; button.textContent = "View recipe"; }
  }
}

el("back").addEventListener("click", () => {
  el("error").hidden = true;
  show("list");
});

bridge.on("ui/notifications/tool-result", (params) => {
  if (params && params.structuredContent) renderList(params.structuredContent);
  else {
    el("loading").hidden = true;
    showError("The host did not deliver recipe data to the app.");
  }
});
bridge.on("ui/notifications/host-context-changed", (params) =>
  applyHostContext((params && params.hostContext) || params));

(async () => {
  applyHostContext(null);
  try {
    const result = await bridge.request("ui/initialize", {
      appInfo: { name: "kotlet-recipes", version: "1.0.0" },
      appCapabilities: {}
    });
    applyHostContext(result && result.hostContext);
    bridge.notify("ui/notifications/initialized");
  } catch (error) {
    showError("MCP Apps initialization failed: " + error.message);
  }
})();
</script>
</body>
</html>
