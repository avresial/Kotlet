<main class="auth-page">
  <section class="auth-card" aria-labelledby="login-title">
    <p class="eyebrow">WELCOME BACK</p>
    <h1 id="login-title">Log in to Kotlet</h1>
    <p class="intro">Continue planning meals and keeping your recipes together.</p>

    <form [formGroup]="form" (ngSubmit)="login()" novalidate>
      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" [attr.aria-invalid]="form.controls.email.invalid && form.controls.email.touched" />
        @if (form.controls.email.touched && form.controls.email.hasError('required')) { <span class="field-error">Email is required.</span> }
        @else if (form.controls.email.touched && form.controls.email.hasError('email')) { <span class="field-error">Enter a valid email address.</span> }
      </label>
      <label>
        Password
        <input type="password" formControlName="password" autocomplete="current-password" [attr.aria-invalid]="form.controls.password.invalid && form.controls.password.touched" />
        @if (form.controls.password.touched && form.controls.password.hasError('required')) { <span class="field-error">Password is required.</span> }
      </label>
      @if (errorMessage()) { <p class="form-error" role="alert">{{ errorMessage() }}</p> }
      <button type="submit" [disabled]="isLoading()">{{ isLoading() ? 'Logging in…' : 'Log in' }}</button>
    </form>

    <p class="switch">New to Kotlet? <a routerLink="/register">Create an account</a></p>
  </section>
</main>
