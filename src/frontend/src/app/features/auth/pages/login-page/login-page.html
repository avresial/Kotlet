<main class="auth-page">
  <section class="auth-card" aria-labelledby="login-title">
    <p class="eyebrow">{{ 'auth.login.eyebrow' | t }}</p>
    <h1 id="login-title">{{ 'auth.login.title' | t }}</h1>
    <p class="intro">{{ 'auth.login.intro' | t }}</p>

    <form [formGroup]="form" (ngSubmit)="login()" novalidate>
      <label>
        {{ 'auth.email' | t }}
        <input pInputText id="email" name="email" type="email" formControlName="email" autocomplete="username" [invalid]="form.controls.email.invalid && form.controls.email.touched" />
        @if (form.controls.email.touched && form.controls.email.hasError('required')) { <p-message severity="error" size="small" variant="simple">{{ 'validation.emailRequired' | t }}</p-message> }
        @else if (form.controls.email.touched && form.controls.email.hasError('email')) { <p-message severity="error" size="small" variant="simple">{{ 'validation.invalidEmail' | t }}</p-message> }
      </label>
      <label>
        {{ 'auth.password' | t }}
        <p-password inputId="password" formControlName="password" autocomplete="current-password" [feedback]="false" [toggleMask]="true" [fluid]="true" [invalid]="form.controls.password.invalid && form.controls.password.touched" />
        @if (form.controls.password.touched && form.controls.password.hasError('required')) { <p-message severity="error" size="small" variant="simple">{{ 'validation.passwordRequired' | t }}</p-message> }
      </label>
      @if (errorMessage()) { <p-message severity="error" role="alert">{{ errorMessage() }}</p-message> }
      <p-button type="submit" [label]="'auth.login.submit' | t" [loading]="isLoading()" [fluid]="true" />
    </form>

    <p class="switch">{{ 'auth.login.newUser' | t }} <a routerLink="/register">{{ 'auth.login.createAccount' | t }}</a></p>
  </section>
</main>
