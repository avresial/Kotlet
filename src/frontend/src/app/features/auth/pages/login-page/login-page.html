<main class="auth-page">
  <section class="auth-card" aria-labelledby="login-title">
    <p class="eyebrow">WELCOME BACK</p>
    <h1 id="login-title">Log in to Kotlet</h1>
    <p class="intro">Continue planning meals and keeping your recipes together.</p>

    <form [formGroup]="form" (ngSubmit)="login()" novalidate>
      <label>
        Email
        <input pInputText type="email" formControlName="email" autocomplete="email" [invalid]="form.controls.email.invalid && form.controls.email.touched" />
        @if (form.controls.email.touched && form.controls.email.hasError('required')) { <p-message severity="error" size="small" variant="simple">Email is required.</p-message> }
        @else if (form.controls.email.touched && form.controls.email.hasError('email')) { <p-message severity="error" size="small" variant="simple">Enter a valid email address.</p-message> }
      </label>
      <label>
        Password
        <p-password formControlName="password" autocomplete="current-password" [feedback]="false" [toggleMask]="true" [fluid]="true" [invalid]="form.controls.password.invalid && form.controls.password.touched" />
        @if (form.controls.password.touched && form.controls.password.hasError('required')) { <p-message severity="error" size="small" variant="simple">Password is required.</p-message> }
      </label>
      @if (errorMessage()) { <p-message severity="error" role="alert">{{ errorMessage() }}</p-message> }
      <p-button type="submit" label="Log in" [loading]="isLoading()" [fluid]="true" />
    </form>

    <p class="switch">New to Kotlet? <a routerLink="/register">Create an account</a></p>
  </section>
</main>
