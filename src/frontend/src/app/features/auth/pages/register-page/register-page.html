<main class="auth-page">
  <section class="auth-card" aria-labelledby="register-title">
    <p class="eyebrow">GET STARTED</p>
    <h1 id="register-title">Create your account</h1>
    <p class="intro">Keep your menus and recipes available whenever you need them.</p>

    <form [formGroup]="form" (ngSubmit)="register()" novalidate>
      <label>
        Email
        <input pInputText type="email" formControlName="email" autocomplete="email" [invalid]="form.controls.email.invalid && form.controls.email.touched" />
        @if (form.controls.email.touched && form.controls.email.hasError('required')) { <p-message severity="error" size="small" variant="simple">Email is required.</p-message> }
        @else if (form.controls.email.touched && form.controls.email.hasError('email')) { <p-message severity="error" size="small" variant="simple">Enter a valid email address.</p-message> }
      </label>
      <label>
        Name
        <input pInputText type="text" formControlName="displayName" autocomplete="name" placeholder="Your name" [invalid]="form.controls.displayName.invalid && form.controls.displayName.touched" />
        @if (form.controls.displayName.touched && form.controls.displayName.hasError('maxlength')) { <p-message severity="error" size="small" variant="simple">Name cannot exceed 100 characters.</p-message> }
      </label>
      <label>
        Password
        <p-password formControlName="password" autocomplete="new-password" [toggleMask]="true" [fluid]="true" [invalid]="form.controls.password.invalid && form.controls.password.touched" />
        @if (form.controls.password.touched && form.controls.password.hasError('required')) { <p-message severity="error" size="small" variant="simple">Password is required.</p-message> }
        @else if (form.controls.password.touched && form.controls.password.hasError('minlength')) { <p-message severity="error" size="small" variant="simple">Use at least 8 characters.</p-message> }
      </label>
      <label>
        Confirm password
        <p-password formControlName="confirmPassword" autocomplete="new-password" [feedback]="false" [toggleMask]="true" [fluid]="true" [invalid]="form.controls.confirmPassword.touched && (form.controls.confirmPassword.invalid || form.hasError('passwordMismatch'))" />
        @if (form.controls.confirmPassword.touched && form.controls.confirmPassword.hasError('required')) { <p-message severity="error" size="small" variant="simple">Confirm your password.</p-message> }
        @else if (form.controls.confirmPassword.touched && form.hasError('passwordMismatch')) { <p-message severity="error" size="small" variant="simple">Passwords do not match.</p-message> }
      </label>
      @if (errorMessage()) { <p-message severity="error" role="alert">{{ errorMessage() }}</p-message> }
      <p-button type="submit" label="Create account" [loading]="isLoading()" [fluid]="true" />
    </form>

    <p class="switch">Already registered? <a routerLink="/login">Log in</a></p>
  </section>
</main>
