<main class="auth-page">
  <section class="auth-card" aria-labelledby="register-title">
    <p class="eyebrow">GET STARTED</p>
    <h1 id="register-title">Create your account</h1>
    <p class="intro">Keep your menus and recipes available whenever you need them.</p>

    <form [formGroup]="form" (ngSubmit)="register()" novalidate>
      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" [attr.aria-invalid]="form.controls.email.invalid && form.controls.email.touched" />
        @if (form.controls.email.touched && form.controls.email.hasError('required')) { <span class="field-error">Email is required.</span> }
        @else if (form.controls.email.touched && form.controls.email.hasError('email')) { <span class="field-error">Enter a valid email address.</span> }
      </label>
      <label>
        Password
        <input type="password" formControlName="password" autocomplete="new-password" [attr.aria-invalid]="form.controls.password.invalid && form.controls.password.touched" />
        @if (form.controls.password.touched && form.controls.password.hasError('required')) { <span class="field-error">Password is required.</span> }
        @else if (form.controls.password.touched && form.controls.password.hasError('minlength')) { <span class="field-error">Use at least 8 characters.</span> }
      </label>
      <label>
        Confirm password
        <input type="password" formControlName="confirmPassword" autocomplete="new-password" [attr.aria-invalid]="form.controls.confirmPassword.touched && (form.controls.confirmPassword.invalid || form.hasError('passwordMismatch'))" />
        @if (form.controls.confirmPassword.touched && form.controls.confirmPassword.hasError('required')) { <span class="field-error">Confirm your password.</span> }
        @else if (form.controls.confirmPassword.touched && form.hasError('passwordMismatch')) { <span class="field-error">Passwords do not match.</span> }
      </label>
      @if (errorMessage()) { <p class="form-error" role="alert">{{ errorMessage() }}</p> }
      <button type="submit" [disabled]="isLoading()">{{ isLoading() ? 'Creating account…' : 'Create account' }}</button>
    </form>

    <p class="switch">Already registered? <a routerLink="/login">Log in</a></p>
  </section>
</main>
