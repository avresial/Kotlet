<main class="auth-page">
  <section class="auth-card" aria-labelledby="register-title">
    <p class="eyebrow">{{ 'auth.register.eyebrow' | t }}</p>
    <h1 id="register-title">{{ 'auth.register.title' | t }}</h1>
    <p class="intro">{{ 'auth.register.intro' | t }}</p>

    <form [formGroup]="form" (ngSubmit)="register()" novalidate>
      <label>
        {{ 'auth.email' | t }}
        <input pInputText type="email" formControlName="email" autocomplete="email" [invalid]="form.controls.email.invalid && form.controls.email.touched" />
        @if (form.controls.email.touched && form.controls.email.hasError('required')) { <p-message severity="error" size="small" variant="simple">{{ 'validation.emailRequired' | t }}</p-message> }
        @else if (form.controls.email.touched && form.controls.email.hasError('email')) { <p-message severity="error" size="small" variant="simple">{{ 'validation.invalidEmail' | t }}</p-message> }
      </label>
      <label>
        {{ 'auth.password' | t }}
        <p-password formControlName="password" autocomplete="new-password" [toggleMask]="true" [fluid]="true" [invalid]="form.controls.password.invalid && form.controls.password.touched" />
        @if (form.controls.password.touched && form.controls.password.hasError('required')) { <p-message severity="error" size="small" variant="simple">{{ 'validation.passwordRequired' | t }}</p-message> }
        @else if (form.controls.password.touched && form.controls.password.hasError('minlength')) { <p-message severity="error" size="small" variant="simple">{{ 'validation.passwordLength' | t }}</p-message> }
      </label>
      <label>
        {{ 'auth.confirmPassword' | t }}
        <p-password formControlName="confirmPassword" autocomplete="new-password" [feedback]="false" [toggleMask]="true" [fluid]="true" [invalid]="form.controls.confirmPassword.touched && (form.controls.confirmPassword.invalid || form.hasError('passwordMismatch'))" />
        @if (form.controls.confirmPassword.touched && form.controls.confirmPassword.hasError('required')) { <p-message severity="error" size="small" variant="simple">{{ 'validation.confirmPassword' | t }}</p-message> }
        @else if (form.controls.confirmPassword.touched && form.hasError('passwordMismatch')) { <p-message severity="error" size="small" variant="simple">{{ 'validation.passwordMismatch' | t }}</p-message> }
      </label>
      @if (errorMessage()) { <p-message severity="error" role="alert">{{ errorMessage() }}</p-message> }
      <p-button type="submit" [label]="'auth.register.submit' | t" [loading]="isLoading()" [fluid]="true" />
    </form>

    <p class="switch">{{ 'auth.register.existingUser' | t }} <a routerLink="/login">{{ 'auth.login.submit' | t }}</a></p>
  </section>
</main>
