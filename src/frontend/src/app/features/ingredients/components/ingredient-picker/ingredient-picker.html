<div class="picker">
  <input
    type="text"
    role="combobox"
    autocomplete="off"
    [attr.aria-label]="ariaLabel() || ('common.ingredient' | t)"
    [attr.aria-expanded]="isOpen()"
    [attr.aria-controls]="isOpen() ? 'ingredient-suggestions' : null"
    [attr.aria-activedescendant]="isOpen() && suggestions().length ? 'ingredient-option-' + activeIndex() : null"
    [placeholder]="placeholder() || ('recipes.ingredientPlaceholder' | t)"
    [disabled]="formDisabled()"
    [value]="query()"
    (input)="onInput($any($event.target).value)"
    (keydown)="onKeydown($event)"
    (blur)="onBlur()"
  />
  @if (isOpen()) {
    <ul id="ingredient-suggestions" role="listbox">
      @for (ingredient of suggestions(); track ingredient.id; let index = $index) {
        <li
          id="ingredient-option-{{ index }}"
          role="option"
          [attr.aria-selected]="index === activeIndex()"
          [class.active]="index === activeIndex()"
          (mousedown)="$event.preventDefault(); select(ingredient)"
        >
          <span>{{ ingredient.name }}</span>
          <small>{{ ingredient.measurementUnit }}</small>
        </li>
      } @empty {
        <li class="empty">{{ 'ingredients.noMatches' | t }}</li>
      }
    </ul>
  }
</div>
