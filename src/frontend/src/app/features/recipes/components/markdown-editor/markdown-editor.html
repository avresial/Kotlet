<div class="markdown-editor">
  <div class="tabs" role="tablist">
    <button type="button" role="tab" [class.active]="activeTab() === 'write'" [attr.aria-selected]="activeTab() === 'write'" (click)="setTab('write')">{{ 'recipes.write' | t }}</button>
    <button type="button" role="tab" [class.active]="activeTab() === 'preview'" [attr.aria-selected]="activeTab() === 'preview'" (click)="setTab('preview')">{{ 'recipes.preview' | t }}</button>
  </div>
  @if (activeTab() === 'write') {
    <textarea
      class="editor-textarea"
      [value]="value()"
      [disabled]="isDisabled()"
      [attr.aria-labelledby]="ariaLabelledby()"
      (input)="onInput($event)"
      [placeholder]="'recipes.markdownPlaceholder' | t"
      rows="10"
    ></textarea>
  }
  @if (activeTab() === 'preview') {
    <div class="preview-pane markdown-body">
      @if (previewHtml()) {
        <div [innerHTML]="previewHtml()"></div>
      } @else {
        <p class="empty-preview">{{ 'recipes.previewEmpty' | t }}</p>
      }
    </div>
  }
</div>
