<div class="ingredient-list-editor" role="group" [attr.aria-labelledby]="ariaLabelledby()">
    <div class="ingredient-rows">
      @for (row of rows; track $index) {
        <div class="ingredient-row" [formGroup]="row">
          <span class="row-index">{{ $index + 1 }}</span>
          <div class="row-fields">
            <label class="field-name">
              <span class="sr-only">Name</span>
              <app-ingredient-picker formControlName="name" [ingredients]="ingredients()" valueMode="name" placeholder="Start typing an ingredient…" (ingredientSelected)="selectIngredient(row)" />
              @if (row.get('name')?.invalid && row.get('name')?.touched) {
                <span class="field-error">
                  @if (row.get('name')?.errors?.['required']) { Name is required }
                  @else if (row.get('name')?.errors?.['maxlength']) { Name cannot exceed 200 characters }
                  @else if (row.get('name')?.errors?.['unknownIngredient']) { Choose an ingredient from the list }
                </span>
              }
            </label>
            <label class="field-qty">
              <span class="sr-only">Quantity</span>
              <input type="number" formControlName="quantity" placeholder="Qty" min="0.001" step="any" />
              @if (row.get('quantity')?.invalid && row.get('quantity')?.touched) {
                <span class="field-error">Quantity must be positive</span>
              }
            </label>
            <label class="field-unit">
              <span class="sr-only">Unit</span>
              <input type="text" formControlName="unit" placeholder="Unit" readonly title="Unit is set by the selected ingredient" />
            </label>
            <label class="field-note">
              <span class="sr-only">Note</span>
              <input type="text" formControlName="note" placeholder="Note (optional)" />
            </label>
          </div>
          <div class="row-actions">
            <button type="button" [disabled]="$index === 0 || $index === rows.length - 1 || isDisabled()" (click)="moveUp($index)" title="Move up" aria-label="Move ingredient up">↑</button>
            <button type="button" [disabled]="$index >= rows.length - 2 || isDisabled()" (click)="moveDown($index)" title="Move down" aria-label="Move ingredient down">↓</button>
            <button type="button" class="delete" [disabled]="isDisabled()" (click)="removeRow($index)" title="Remove" aria-label="Remove ingredient">×</button>
          </div>
        </div>
      }
    </div>
  @if (ingredientLoadError()) {
    <p class="catalogue-error" role="alert">Ingredients could not be loaded. Try refreshing the page.</p>
  }
</div>
