<main class="recipe-create-page">
  <a class="back" routerLink="/recipes">← {{ 'recipes.back' | t }}</a>
  <header>
    <p class="eyebrow">{{ 'recipes.new' | t }}</p>
    <h1>{{ 'recipes.create' | t }}</h1>
  </header>
  <app-recipe-form
    [isSaving]="isSaving()"
    [error]="error()"
    [showImagePicker]="true"
    [submitLabel]="'recipes.create' | t"
    (imageSelected)="selectImage($event)"
    (submitted)="save($event)"
    (cancelled)="cancel()"
  ></app-recipe-form>
</main>
