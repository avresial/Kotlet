<main class="recipe-edit-page">
  <a class="back" [routerLink]="['/recipes', id]">← Back to recipe</a>
  <header>
    <p class="eyebrow">Editing</p>
    <h1>{{ recipe()?.title ?? 'Edit recipe' }}</h1>
  </header>

  @if (isLoading()) {
    <p class="loading">Loading recipe…</p>
  } @else if (!recipe() && error()) {
    <div class="error" role="alert">{{ error() }}</div>
  } @else if (recipe()) {
    <app-recipe-form
      [initialValue]="recipe()"
      [isSaving]="isSaving()"
      [error]="error()"
      submitLabel="Save changes"
      (submitted)="save($event)"
      (cancelled)="cancel()"
    ></app-recipe-form>
    <app-image-gallery-editor [recipeId]="id"></app-image-gallery-editor>
  }
</main>
