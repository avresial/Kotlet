<main class="recipe-edit-page">
  <a class="back" [routerLink]="['/recipes', id]">← {{ 'recipes.backToRecipe' | t }}</a>
  <header>
    <p class="eyebrow">{{ 'recipes.editing' | t }}</p>
    <h1>{{ recipe()?.title ?? 'Edit recipe' }}</h1>
  </header>

  @if (isLoading()) {
    <p class="loading">{{ 'recipes.loadingOne' | t }}</p>
  } @else if (!recipe() && error()) {
    <div class="error" role="alert">{{ error() }}</div>
  } @else if (recipe()) {
    <app-recipe-form
      [initialValue]="recipe()"
      [isSaving]="isSaving()"
      [error]="error()"
      [submitLabel]="'recipes.saveChanges' | t"
      (submitted)="save($event)"
      (cancelled)="cancel()"
    ></app-recipe-form>
    <app-image-gallery-editor
      [recipeId]="id"
      [title]="recipe()!.title"
      [ingredients]="ingredientNames()"
    ></app-image-gallery-editor>
  }
</main>
