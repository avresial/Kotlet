<header>
  <a class="brand" routerLink="/">KOTLET</a>
  <nav aria-label="Account">
    @if (auth.currentUser(); as user) {
      <span>{{ user.displayName || user.email }}</span>
      <p-button type="button" label="Log out" severity="secondary" variant="text" (onClick)="logout()" [loading]="isLoggingOut()" />
      @if (logoutError()) { <span class="logout-error" role="alert">{{ logoutError() }}</span> }
    } @else {
      <a pButton routerLink="/login" severity="secondary" variant="text">Log in</a>
      <a pButton routerLink="/register">Create account</a>
    }
  </nav>
</header>
