@if (auth.currentUser(); as user) {
  <aside class="app-sidebar">
    <a class="brand" routerLink="/dashboard" aria-label="Kotlet dashboard">
      <img class="brand-mark" src="kotlet-logo.svg" alt="Kotlet" />
    </a>

    <nav aria-label="Main navigation">
      <a class="nav-item" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <span class="icon" aria-hidden="true">⌂</span><span>Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/recipes" routerLinkActive="active"><span class="icon" aria-hidden="true">▤</span><span>Recipes</span></a>
      <a class="nav-item" routerLink="/meal-planner" routerLinkActive="active"><span class="icon" aria-hidden="true">▦</span><span>Meal Planner</span></a>
      <a class="nav-item" routerLink="/shopping-list" routerLinkActive="active"><span class="icon" aria-hidden="true">✓</span><span>Shopping list</span></a>
      <a class="nav-item" routerLink="/pantry" routerLinkActive="active"><span class="icon" aria-hidden="true">□</span><span>Pantry</span></a>
      <a class="nav-item" routerLink="/ingredients" routerLinkActive="active">
        <span class="icon" aria-hidden="true">◉</span><span>Ingredients</span>
      </a>
    </nav>

    <footer>
      <button class="account-trigger" type="button" (click)="toggleAccountMenu($event)" [attr.aria-expanded]="isAccountMenuOpen()" aria-haspopup="menu">
        <span>Hello, <strong>{{ user.displayName || user.email.split('@')[0] }}</strong></span>
        <span class="chevron" aria-hidden="true">⌃</span>
      </button>
      @if (isAccountMenuOpen()) {
        <div class="account-menu" role="menu" (click)="$event.stopPropagation()">
          <a role="menuitem" routerLink="/settings" (click)="closeAccountMenu()"><span aria-hidden="true">⚙</span>Settings</a>
          <button role="menuitem" type="button" (click)="logout()" [disabled]="isLoggingOut()">
            <span aria-hidden="true">↪</span>{{ isLoggingOut() ? 'Logging off…' : 'Log off' }}
          </button>
        </div>
      }
      @if (logoutError()) { <span class="logout-error" role="alert">{{ logoutError() }}</span> }
    </footer>
  </aside>
} @else {
  <header class="public-header">
    <a class="brand" routerLink="/"><img class="brand-mark" src="kotlet-logo.svg" alt="Kotlet" /></a>
    <nav aria-label="Account">
      <a class="account-link login-link" routerLink="/login">Log in</a>
      <a class="account-link create-link" routerLink="/register">Create account</a>
    </nav>
  </header>
}
