name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'src/frontend/**'
      - '.github/workflows/github-pages.yml'
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages and verify the deployment origin
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, skipping queued runs in between
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'src/frontend/.nvmrc'
          cache: npm
          cache-dependency-path: 'src/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build
        working-directory: src/frontend
        run: npm run build

      - name: Add SPA fallback and disable Jekyll
        working-directory: src/frontend/dist/kotlet-web/browser
        run: |
          cp index.html 404.html
          touch .nojekyll

      - name: Archive Pages artifact
        run: >-
          tar --dereference --hard-dereference
          --directory src/frontend/dist/kotlet-web/browser
          -cvf "$RUNNER_TEMP/artifact.tar" .

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
