name: Deploy frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'src/frontend/**'
      - '.github/workflows/azure-static-web-apps.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'src/frontend/**'
      - '.github/workflows/azure-static-web-apps.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-deploy:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'src/frontend/.nvmrc'
          cache: npm
          cache-dependency-path: 'src/frontend/package-lock.json'

      - name: Build and test frontend
        working-directory: src/frontend
        run: |
          npm ci
          npm run build
          npm test -- --watch=false

      - name: Deploy frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_HILL_095DCFD03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: 'src/frontend/dist/kotlet-web/browser'
          output_location: ''
          skip_app_build: true

  close-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Close preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_HILL_095DCFD03 }}
          action: close
